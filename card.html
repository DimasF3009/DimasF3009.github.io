<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemesanan</title>
    <link rel="stylesheet" href="../assets/css/card.css">
</head>
<style>
    body{
        padding: 0;
        margin: 0;
        background-color: rgb(7, 230, 7);
    }
    #wrapper{
        padding: 20px;
        margin: 20px;
        text-align: center;
        justify-content: center;
        border-style: solid;
        border-width: 2px;
        background-color: white;
        height: 100%;
    }
    #wrapper .hero span{
        color: rgb(13, 248, 13);
    }
    .hero{
        width: 100%;

    }
    .main-content{
        display: inline-flex;
    }
    .card img{
        width: 100px;
 
    }
    .card{
        margin: 1.2rem;
        border: 1px solid;
        background-color: rgb(228, 227, 227);
        border-radius: 50%;
    }

    .card:hover{
        border: 1px solid;
        padding: 5px;
        box-shadow: 5px 10px;
        background-color: white;
    }
    .card a{
        text-decoration: none;
    }

    .addres{
        text-align: start;
        margin-left: 3rem;
    }

    @media (max-width: 600px){
        .addres{
            margin-left: 15px;
        }

        .card{
            margin: 10px;
            border-radius: 90%;
        }

        .card img{
            width: 90px;
        }
    }
</style>
<body>
    <div id="wrapper">
        <div class="hero">
            <h1 style="font-style:  oblique;">Link <span>Pemesanan</span></h1>
            <h4>Kunjungi Gerai Kami di</h4>
        </div>

        <div class="main-content">
            <div class="card">
                <a href="#">
                    <img src="../image/tokped.png" alt="" style="height: 95px;">    
                </a>
            </div>
            <div class="card">
                <a href="#">
                    <img src="../image/shopee.png" alt="">
                </a>
            </div>
            <div class="card">
                <a href="#">    
                    <img src="../image/lazada.png" alt="">
                </a>
            </div>
        </div>
        <hr style="width: 90%; height: 3px; background-color: black;">
        <div class="addres">
            <h2>
              <span>
                Alamat Kantor Kami
              </span>
            </h2>
            <p>Anda bisa kunjungi kantor operasional kami, alamatnya:</p>
            <blockquote style="border-left: 2px solid; padding-left: 20px; margin-left: 3px;">
              <p><i>GardenNeng Shop</i></p>
              <p><i>Jl. Puma 7 No 55</i></p>
              <p><i>Kel. Jayamukti, Kec. Cikarang Pusat</i></p>
              <p><i>Cikarang Pusat 17845</i></p>
              <p><i>Tel: 0812 9999 9999 (Hanya aktif pada jam kerja)</i></p>
            </blockquote>
        </div>

    </div>
</body>
</html>
